name: CI/CD - Proyecto Final (Registraduria)

# Se ejecuta en cada push y en cada Pull Request.
# Al exigirse como "status check" en la proteccion de rama, BLOQUEA los merges
# si las pruebas o la verificacion de cobertura fallan.
on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "**" ]

jobs:
  build-test-coverage:
    name: Compilar, probar y verificar cobertura
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del codigo
        uses: actions/checkout@v4

      - name: Configurar JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      # mvn clean verify -> compila, ejecuta TODAS las pruebas (unitarias,
      # integracion y sistema) y verifica el umbral de cobertura JaCoCo (>= 80%).
      # Si algo falla, el job falla y -con branch protection- impide el merge.
      - name: Ejecutar pruebas y verificar cobertura
        run: mvn -B clean verify

      - name: Publicar reportes de pruebas (Surefire)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: target/surefire-reports/

      - name: Publicar reporte de cobertura (JaCoCo)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: target/site/jacoco/
